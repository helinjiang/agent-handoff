name: demo-login
steps:
  - id: a-clarify
    executor: trae
    input: brief.md
    output: steps/01-a-clarify/output.md
    acceptance:
      - 补齐需求澄清问题与明确范围/非目标
      - 产出可执行的 brief+decisions 补充建议

  - id: b-plan
    executor: trae
    input: steps/01-a-clarify/output.md
    output: steps/02-b-plan/output.md
    acceptance:
      - 拆分为 2-4 个可独立验收的工作项（work items）
      - 给出步骤队列（workflow 更新建议）与每项验收点

  - id: login-implement
    workItemId: login
    executor: trae
    input: steps/02-b-plan/output.md
    output: steps/03-login-implement/output.md
    acceptance:
      - 实现注册/登录/登出/受保护接口（API）
      - 密码哈希存储与基础校验

  - id: login-test
    workItemId: login
    executor: trae
    input: steps/03-login-implement/output.md
    output: steps/04-login-test/output.md
    acceptance:
      - 提供可运行的最小测试或手工验收脚本
      - 覆盖成功/失败路径

  - id: login-accept
    workItemId: login
    executor: trae
    input: steps/04-login-test/output.md
    output: steps/05-login-accept/output.md
    acceptance:
      - 验收通过或给出明确未通过原因与修复建议

  - id: b-summary
    executor: trae
    input: steps/05-login-accept/output.md
    output: steps/06-b-summary/output.md
    acceptance:
      - 输出总结（变更点、如何运行、后续建议）
